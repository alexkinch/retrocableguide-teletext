version: 2
updates:
  # npm deps — @iptv/playlist and @iptv/xmltv parse the live feeds, so
  # bumps can affect generator output. Treat as fix.
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      npm-dependencies:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - minor
          - patch
    commit-message:
      prefix: "fix"
      include: scope

  # GitHub Actions — CI-only, don't cut releases.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      actions-dependencies:
        patterns:
          - "*"
    commit-message:
      prefix: "ci"
      include: scope
